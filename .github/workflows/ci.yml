name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm format:check

      - name: Type Check
        run: pnpm typecheck

      - name: Unit Test
        run: pnpm test:unit

      - name: Integration Test
        run: pnpm test:integration

      - name: E2E Test
        run: pnpm test:e2e

      - name: Start Local E2E Services
        run: docker compose up --build -d

      - name: Wait For Local E2E Services
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null && curl -fsS http://127.0.0.1:8081/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Local E2E services did not become healthy in time" >&2
          docker compose ps
          exit 1

      - name: E2E Local Test
        run: pnpm test:e2e:local

      - name: Dump Local E2E Service Logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Local E2E Services
        if: always()
        run: docker compose down --remove-orphans

      - name: Firestore Rules Test
        run: pnpm test:rules

      - name: Build
        run: pnpm build
